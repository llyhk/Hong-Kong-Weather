<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會所大廳 - 天氣警告顯示</title>
    <style>
        /* 基本頁面設定，背景設為透明，適合電子屏顯示 */
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #e8e4db;
            background-color: #1a1a1a
            overflow: hidden;
        }

        /* 警告圖示的容器排版 */
        #warning-container {
            display: flex;
            flex-direction: row;     /* 橫向排隊 */
            justify-content: flex-end; /* 【關鍵修改】全部圖示往右邊靠攏 */
            align-items: center;     /* 垂直置中 */
            width: 100%;
            height: 100%;
            gap: 15px;               /* 每個圖示之間的距離，可依喜好微調 */
            padding: 10px;           /* 邊界保留一點呼吸空間 */
            box-sizing: border-box;
        }

        /* 統一的圖示大小 */
        .warning-img {
            height: 90%;             /* 高度固定為框框的 90% */
            max-height: 60px;       /* 設定一個最大高度，避免在大螢幕上大得太誇張 */
            width: auto;             /* 寬度按比例自動調整 */
            object-fit: contain;     /* 確保圖示不變形 */
            flex-shrink: 0;          /* 【保險機制】空間不夠時，寧願超出畫面也不准把圖示壓扁 */
        }

        /* 如果圖片遺失，顯示的備用文字方塊 */
        .fallback-box {
            background-color: #ff0000;
            color: white;
            padding: 10px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            font-family: "Microsoft JhengHei", "PingFang HK", sans-serif;
        }

        /* 沒有警告時的文字樣式 */
        .no-warning {
            display: none;
        }
    </style>
</head>
<body>

    <div id="warning-container">
    </div>

    <script>
        async function fetchWarnings() {
            try {
                // 抓取天文台的資料
                const response = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc');
                const data = await response.json();
                const container = document.getElementById('warning-container');
                container.innerHTML = ''; 

                const activeWarningKeys = Object.keys(data);
                if (activeWarningKeys.length === 0) return; // 沒有警告就維持空白

                // 有警告的話，逐一把它們顯示出來
                activeWarningKeys.forEach(key => {
                     const warningName = data[key].name; // 天文台直接給名字，例如 "黃色暴雨警告信號"
                     const specificCode = data[key].code; // 天文台直接給代碼，例如 "WRAINA"
                     
                     // 組合出圖片的 HTML，如果圖片找不到就顯示 fallback-box 的文字
                     const iconHtml = `
                        <img class="warning-img" 
                             src="icon/${specificCode}.png" 
                             alt="${warningName}" 
                             onerror="this.onerror=null; this.outerHTML='<div class=\\'fallback-box\\'>${warningName}</div>';">
                     `;
                     container.innerHTML += iconHtml;
                });

            } catch (error) {
                console.error('讀取天氣警告失敗:', error);
                document.getElementById('warning-container').innerHTML = '<div class="fallback-box">無法連線至香港天文台</div>';
            }
        }

        // 網頁開啟時立刻執行一次
        fetchWarnings();
        
        // 設定每 5 分鐘自動重新載入一次最新資訊
        setInterval(fetchWarnings, 300000);
    </script>
</body>
</html>
