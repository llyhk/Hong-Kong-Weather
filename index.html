<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會所大廳 - 天氣警告顯示</title>
    <style>
        /* 基本頁面設定，背景設為透明，適合電子屏顯示 */
        body {
            margin: 0;
            padding: 0;
            background-color: transparent; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 警告圖示的容器排版 */
        #warning-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #warning-container {
            display: flex;
            flex-wrap: wrap;       /* 空間不夠時自動換行 */
            justify-content: center; /* 水平置中 */
            align-content: center;   /* 垂直置中（不管是一排還是兩排，都會乖乖待在框框正中間）*/
            width: 100%;
            height: 100%;
            gap: 10px;             /* 圖示之間的呼吸空間 */
            padding: 10px;
            box-sizing: border-box;
        }

        /* 預設圖示樣式 (針對 2 個以上的警告) */
        .warning-img {
            /* 最大不超過框框的 45%，這樣無論如何都能排成 2x2 的田字型，絕對不會超出框外 */
            max-width: 45%;  
            max-height: 45%; 
            object-fit: contain; /* 確保圖示比例正常，不被壓扁 */
        }

        /* 特殊樣式：如果目前只有 1 個警告，允許它放大到 90% */
        .warning-img.single-warning {
            max-width: 90%;
            max-height: 90%;
        }

        /* 如果圖片遺失，顯示的備用文字方塊 */
        .fallback-box {
            background-color: #ff0000;
            color: white;
            padding: 10px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            font-family: "Microsoft JhengHei", "PingFang HK", sans-serif;
        }

        /* 沒有警告時的文字樣式 */
        .no-warning {
            display: none;
        }
    </style>
</head>
<body>

    <div id="warning-container">
    </div>

    <script>
        // 天氣警告代碼對應表 (天文台官方代碼)
        // 這些代碼將作為你圖片的檔名
        const codeMap = {
            "WFIREY": "黃色火災危險",
            "WFIRER": "紅色火災危險",
            "WFROST": "霜凍警告",
            "WHOT": "酷熱天氣",
            "WCOLD": "寒冷天氣",
            "WMSGNL": "強烈季候風",
            "WRAINB": "黑色暴雨",
            "WRAINA": "黃色暴雨",
            "WRAINR": "紅色暴雨",
            "WTS": "雷暴警告",
            "WTCSGNL_1": "一號戒備信號",
            "WTCSGNL_3": "三號強風信號",
            "WTCSGNL_8NE": "八號東北烈風",
            "WTCSGNL_8NW": "八號西北烈風",
            "WTCSGNL_8SE": "八號東南烈風",
            "WTCSGNL_8SW": "八號西南烈風",
            "WTCSGNL_9": "九號烈風信號",
            "WTCSGNL_10": "十號颶風信號",
            "WL": "山泥傾瀉警告",
            "WNTFL": "新界北部水浸"
        };

        async function fetchWarnings() {
            try {
                // 讀取香港天文台開放數據 API (天氣警告摘要)
                const response = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc');
                const data = await response.json();
                const container = document.getElementById('warning-container');
                container.innerHTML = ''; // 清空內容

                const activeWarnings = Object.keys(data);
                
                // 如果目前沒有任何警告，網頁顯示空白
                if (activeWarnings.length === 0) {
                     return;
                }

                // 根據生效的警告生成對應的圖片
                activeWarnings.forEach(code => {
                     const warningName = data[code].name;
                     // 假設圖片放在一個名為 "icon" 的資料夾中，檔名就是代碼 (例如 WMSGNL.png)
                     const iconHtml = `
                        <img class="warning-img" 
                             src="icon/${code}.png" 
                             alt="${warningName}" 
                             onerror="this.onerror=null; this.outerHTML='<div class=\\'fallback-box\\'>(圖片遺失: ${warningName})</div>';">
                     `;
                     container.innerHTML += iconHtml;
                });

            } catch (error) {
                console.error('讀取天氣警告失敗:', error);
                document.getElementById('warning-container').innerHTML = '<div class="fallback-box">連線天文台失敗</div>';
            }
        }

        // 網頁開啟時立刻執行一次
        fetchWarnings();
        
        // 設定每 5 分鐘自動重新載入一次最新資訊
        setInterval(fetchWarnings, 300000);
    </script>
</body>
</html>
